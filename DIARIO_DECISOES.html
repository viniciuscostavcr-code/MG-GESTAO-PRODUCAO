<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestFood — Diário de Decisões</title>
<style>
:root{--grn:#2D6A4F;--grn2:#1B4332;--claro:#EAF4EF;--border:#C8D6CE;--brown:#3D2B1F;--gray:#9CA3AF;--red:#C0392B;--orange:#E67E22;--yellow:#D97706;--bg:#F7F7F5;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#333;line-height:1.5;padding-bottom:40px;}
.topbar{background:linear-gradient(135deg,var(--grn2),var(--grn));color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.topbar-title{font-size:1.1rem;font-weight:800;}
.topbar-title span{color:#A7D9BC;}
.btn-hub{background:rgba(167,217,188,.22);color:#fff;text-decoration:none;padding:7px 12px;border-radius:8px;font-size:.8rem;font-weight:600;}
.wrap{max-width:900px;margin:0 auto;padding:14px;}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-title{font-size:.95rem;font-weight:800;color:var(--grn2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.kpi-val{font-size:1.5rem;font-weight:800;color:var(--grn);}
.kpi-label{font-size:.72rem;color:var(--gray);margin-top:2px;}
label{display:block;font-size:.75rem;font-weight:700;color:var(--grn2);margin-bottom:4px;margin-top:10px;}
input,select,textarea{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:9px;font-size:16px;font-family:inherit;color:var(--brown);background:#fff;}
textarea{min-height:60px;resize:vertical;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{background:var(--grn);color:#fff;border:none;padding:12px 20px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-top:14px;}
.btn:active{background:var(--grn2);}
.btn-sec{background:#fff;color:var(--grn);border:1.5px solid var(--grn);}
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.fbtn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--brown);font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;}
.fbtn.on{background:var(--grn);color:#fff;border-color:var(--grn);}
.dec{border-left:4px solid var(--grn);background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.dec.concluida{border-left-color:var(--gray);opacity:.85;}
.dec-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.dec-data{font-size:.7rem;color:var(--gray);font-weight:600;}
.dec-decisao{font-weight:700;color:var(--brown);font-size:.92rem;margin:2px 0 6px;}
.dec-motivo{font-size:.8rem;color:#555;background:var(--claro);border-radius:7px;padding:6px 9px;margin-bottom:6px;}
.dec-meta{display:flex;gap:6px;flex-wrap:wrap;font-size:.68rem;margin-top:6px;}
.tag{padding:2px 8px;border-radius:20px;font-weight:700;}
.tag-cat{background:#E3F0E8;color:var(--grn);}
.tag-prod{background:#FDF0E3;color:var(--orange);}
.tag-imp{background:#FEF3C7;color:#92400E;}
.tag-st-a{background:#DBEAFE;color:#1E40AF;}
.tag-st-c{background:#DCFCE7;color:#166534;}
.dec-result{font-size:.78rem;color:var(--grn2);margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);}
.dec-acoes{display:flex;gap:8px;margin-top:8px;}
.mini{font-size:.68rem;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--grn);cursor:pointer;font-family:inherit;font-weight:600;}
.vazio{text-align:center;color:var(--gray);padding:30px;font-size:.85rem;}
.status-msg{padding:10px;border-radius:8px;margin-top:10px;font-size:.8rem;font-weight:600;text-align:center;display:none;}
.status-ok{background:#DCFCE7;color:#166534;}
.status-err{background:#FEE2E2;color:#991B1B;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-bg.on{display:flex;}
.modal{background:#fff;border-radius:14px;padding:18px;max-width:500px;width:100%;max-height:90vh;overflow:auto;}
@media(max-width:560px){.kpi-grid{grid-template-columns:1fr 1fr;}.row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">Gest<span>Food</span> — 📓 Diário de Decisões</div>
  <a href="GESTFOOD_INDEX.html" class="btn-hub">← Menu</a>
</div>

<div class="wrap">
  <!-- RESUMO -->
  <div class="kpi-grid" id="kpis"></div>

  <!-- NOVA DECISÃO -->
  <div class="card">
    <div class="card-title">➕ Registrar decisão</div>
    <div class="row">
      <div><label>Data</label><input type="date" id="fData"></div>
      <div><label>Categoria</label>
        <select id="fCategoria">
          <option value="PRECO">💵 Preço</option>
          <option value="RUPTURA">🔴 Ruptura</option>
          <option value="DESPERDICIO">🗑️ Desperdício</option>
          <option value="PRODUCAO">🍞 Produção</option>
          <option value="OUTRO">📌 Outro</option>
        </select>
      </div>
    </div>
    <label>Decisão (o que você fez)</label>
    <textarea id="fDecisao" placeholder="Ex: Coloquei a torta de chocolate na produção diária"></textarea>
    <label>Motivo / dado que embasou</label>
    <textarea id="fMotivo" placeholder="Ex: Vendeu só 7 de 15 dias em julho, ~R$800 de venda perdida"></textarea>
    <div class="row">
      <div><label>Produto (opcional)</label><input type="text" id="fProduto" placeholder="Torta de chocolate"></div>
      <div><label>Setor</label>
        <select id="fSetor">
          <option value="">—</option>
          <option value="PADARIA">Padaria</option>
          <option value="CONFEITARIA">Confeitaria</option>
          <option value="LANCHONETE">Lanchonete</option>
          <option value="RESTAURANTE">Restaurante</option>
          <option value="GERAL">Geral</option>
        </select>
      </div>
    </div>
    <label>Impacto financeiro estimado (R$/mês) — opcional</label>
    <input type="number" id="fImpacto" placeholder="Ex: 1600" step="0.01">
    <button class="btn" id="btnSalvar" onclick="salvar()">💾 Registrar decisão</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <!-- LISTA -->
  <div class="card">
    <div class="card-title">📋 Decisões registradas</div>
    <div class="filtros" id="filtrosCat"></div>
    <div class="filtros" id="filtrosStatus"></div>
    <div id="lista"></div>
  </div>
</div>

<!-- MODAL RESULTADO -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="card-title">✅ Registrar resultado</div>
    <div id="modalDecisao" style="font-size:.85rem;color:var(--brown);font-weight:700;margin-bottom:10px;"></div>
    <label>O que aconteceu depois? (resultado)</label>
    <textarea id="mResultado" placeholder="Ex: Ruptura zerou em agosto, produto vende todos os dias agora"></textarea>
    <label>Marcar como</label>
    <select id="mStatus">
      <option value="EM_ANDAMENTO">Em andamento</option>
      <option value="CONCLUIDA">Concluída</option>
    </select>
    <button class="btn" onclick="salvarResultado()">Salvar</button>
    <button class="btn btn-sec" onclick="fecharModal()" style="margin-top:8px;">Cancelar</button>
  </div>
</div>

<script>
const SUPA_URL='https://rjkseydseuotdkavskss.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqa3NleWRzZXVvdGRrYXZza3NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTE4OTAsImV4cCI6MjA4Nzc4Nzg5MH0.wEzZ9sZhXJhu0jjNx2OeW7RacGi8djUj-9r9u1-8KYY';
const SH={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

var DECISOES=[];
var filtroCat='TODAS';
var filtroStatus='TODAS';
var editandoId=null;

var CAT_INFO={
  PRECO:{emoji:'💵',nome:'Preço'},
  RUPTURA:{emoji:'🔴',nome:'Ruptura'},
  DESPERDICIO:{emoji:'🗑️',nome:'Desperdício'},
  PRODUCAO:{emoji:'🍞',nome:'Produção'},
  OUTRO:{emoji:'📌',nome:'Outro'}
};

function hoje(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtData(iso){if(!iso)return '';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtRs(v){if(v===null||v===undefined||v==='')return null;return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showStatus(msg,tipo){
  var el=document.getElementById('statusMsg');
  el.textContent=msg;el.className='status-msg status-'+tipo;el.style.display='block';
  if(tipo==='ok')setTimeout(function(){el.style.display='none';},3000);
}

async function sbGet(path){
  var r=await fetch(SUPA_URL+'/rest/v1/'+path,{headers:SH});
  if(!r.ok)throw new Error(await r.text());
  return await r.json();
}

async function carregar(){
  try{
    DECISOES=await sbGet('diario_decisoes?select=*&order=data.desc,criado_em.desc');
    render();
  }catch(e){
    showStatus('Erro ao carregar: '+e.message,'err');
  }
}

async function salvar(){
  var decisao=document.getElementById('fDecisao').value.trim();
  if(!decisao){showStatus('Escreva a decisão.','err');return;}
  var obj={
    data:document.getElementById('fData').value||hoje(),
    decisao:decisao,
    motivo:document.getElementById('fMotivo').value.trim(),
    categoria:document.getElementById('fCategoria').value,
    produto:document.getElementById('fProduto').value.trim(),
    setor:document.getElementById('fSetor').value,
    impacto_rs:document.getElementById('fImpacto').value?Number(document.getElementById('fImpacto').value):null,
    status:'EM_ANDAMENTO'
  };
  var btn=document.getElementById('btnSalvar');btn.disabled=true;
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/diario_decisoes',{
      method:'POST',headers:Object.assign({},SH,{'Prefer':'return=minimal'}),body:JSON.stringify(obj)
    });
    if(!r.ok)throw new Error(await r.text());
    showStatus('✅ Decisão registrada!','ok');
    document.getElementById('fDecisao').value='';
    document.getElementById('fMotivo').value='';
    document.getElementById('fProduto').value='';
    document.getElementById('fImpacto').value='';
    await carregar();
  }catch(e){showStatus('Erro: '+e.message,'err');}
  btn.disabled=false;
}

function abrirModal(id){
  editandoId=id;
  var d=DECISOES.find(function(x){return x.id===id;});
  if(!d)return;
  document.getElementById('modalDecisao').textContent=d.decisao;
  document.getElementById('mResultado').value=d.resultado||'';
  document.getElementById('mStatus').value=d.status||'EM_ANDAMENTO';
  document.getElementById('modalBg').classList.add('on');
}
function fecharModal(){document.getElementById('modalBg').classList.remove('on');editandoId=null;}

async function salvarResultado(){
  if(!editandoId)return;
  var obj={
    resultado:document.getElementById('mResultado').value.trim(),
    status:document.getElementById('mStatus').value
  };
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/diario_decisoes?id=eq.'+editandoId,{
      method:'PATCH',headers:Object.assign({},SH,{'Prefer':'return=minimal'}),body:JSON.stringify(obj)
    });
    if(!r.ok)throw new Error(await r.text());
    fecharModal();
    await carregar();
  }catch(e){alert('Erro: '+e.message);}
}

async function excluir(id){
  if(!confirm('Excluir esta decisão? Não dá pra desfazer.'))return;
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/diario_decisoes?id=eq.'+id,{method:'DELETE',headers:SH});
    if(!r.ok)throw new Error(await r.text());
    await carregar();
  }catch(e){alert('Erro: '+e.message);}
}

function setFiltroCat(c){filtroCat=c;render();}
function setFiltroStatus(s){filtroStatus=s;render();}

function render(){
  // KPIs
  var total=DECISOES.length;
  var concluidas=DECISOES.filter(function(d){return d.status==='CONCLUIDA';}).length;
  var impactoTotal=DECISOES.reduce(function(s,d){return s+(Number(d.impacto_rs)||0);},0);
  document.getElementById('kpis').innerHTML=
    '<div class="kpi"><div class="kpi-val">'+total+'</div><div class="kpi-label">Decisões registradas</div></div>'+
    '<div class="kpi"><div class="kpi-val">'+concluidas+'</div><div class="kpi-label">Concluídas</div></div>'+
    '<div class="kpi"><div class="kpi-val" style="font-size:1.15rem">'+(fmtRs(impactoTotal)||'R$ 0')+'</div><div class="kpi-label">Impacto estimado/mês</div></div>';

  // Filtros de categoria
  var cats=['TODAS','PRECO','RUPTURA','DESPERDICIO','PRODUCAO','OUTRO'];
  document.getElementById('filtrosCat').innerHTML=cats.map(function(c){
    var lbl=c==='TODAS'?'Todas':(CAT_INFO[c].emoji+' '+CAT_INFO[c].nome);
    return '<button class="fbtn'+(filtroCat===c?' on':'')+'" onclick="setFiltroCat(\''+c+'\')">'+lbl+'</button>';
  }).join('');

  // Filtros de status
  var sts=[['TODAS','Todas'],['EM_ANDAMENTO','⏳ Em andamento'],['CONCLUIDA','✅ Concluídas']];
  document.getElementById('filtrosStatus').innerHTML=sts.map(function(s){
    return '<button class="fbtn'+(filtroStatus===s[0]?' on':'')+'" onclick="setFiltroStatus(\''+s[0]+'\')">'+s[1]+'</button>';
  }).join('');

  // Lista filtrada
  var lista=DECISOES.filter(function(d){
    if(filtroCat!=='TODAS'&&d.categoria!==filtroCat)return false;
    if(filtroStatus!=='TODAS'&&d.status!==filtroStatus)return false;
    return true;
  });

  if(lista.length===0){
    document.getElementById('lista').innerHTML='<div class="vazio">Nenhuma decisão'+(filtroCat!=='TODAS'||filtroStatus!=='TODAS'?' com esse filtro.':' ainda. Registre a primeira acima! 👆')+'</div>';
    return;
  }

  document.getElementById('lista').innerHTML=lista.map(function(d){
    var ci=CAT_INFO[d.categoria]||CAT_INFO.OUTRO;
    var h='<div class="dec'+(d.status==='CONCLUIDA'?' concluida':'')+'">';
    h+='<div class="dec-top"><div style="flex:1">';
    h+='<div class="dec-data">'+fmtData(d.data)+'</div>';
    h+='<div class="dec-decisao">'+esc(d.decisao)+'</div>';
    h+='</div></div>';
    if(d.motivo)h+='<div class="dec-motivo">📊 '+esc(d.motivo)+'</div>';
    h+='<div class="dec-meta">';
    h+='<span class="tag tag-cat">'+ci.emoji+' '+ci.nome+'</span>';
    if(d.produto)h+='<span class="tag tag-prod">'+esc(d.produto)+'</span>';
    if(d.setor)h+='<span class="tag tag-prod">'+esc(d.setor)+'</span>';
    if(d.impacto_rs)h+='<span class="tag tag-imp">💰 '+fmtRs(d.impacto_rs)+'/mês</span>';
    h+='<span class="tag '+(d.status==='CONCLUIDA'?'tag-st-c">✅ Concluída':'tag-st-a">⏳ Em andamento')+'</span>';
    h+='</div>';
    if(d.resultado)h+='<div class="dec-result">✅ <b>Resultado:</b> '+esc(d.resultado)+'</div>';
    h+='<div class="dec-acoes">';
    h+='<button class="mini" onclick="abrirModal(\''+d.id+'\')">'+(d.resultado?'✏️ Editar resultado':'➕ Registrar resultado')+'</button>';
    h+='<button class="mini" style="color:var(--red);border-color:#F5C6C6" onclick="excluir(\''+d.id+'\')">🗑️</button>';
    h+='</div>';
    h+='</div>';
    return h;
  }).join('');
}

// Init
document.getElementById('fData').value=hoje();
carregar();
</script>
</body>
</html>
