<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2D6A4F">
<title>📋 Checklist & Projeção — Supermercado MG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#F7F7F5;--white:#FFF;--brown:#1C1C1A;--brown2:#4A4A46;
  --grn:#2D6A4F;--grn2:#1B4332;--grn-l:#EAF4EF;--grn-ll:#F0FAF4;
  --border:#E2EDE8;--cream:#F7F7F5;
  --red:#C0392B;--red2:#A93226;--red-l:#FDECEA;--red-ll:#FFF5F5;
  --orange:#E67E22;--orange-l:#FEF3EC;
  --warn:#D97706;--warn-l:#FEF3C7;
  --gold:#B45309;--gold-l:#FEF3C7;--gold-ll:#FFFBEB;
  --blue:#1D4ED8;--blue-l:#EEF2FF;
  --gray:#6B7280;--gray-l:#F4F4F2;--gray-ll:#FAFAF8;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.07);--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--brown);display:flex;flex-direction:column;}

/* SPLASH */
#splash{position:fixed;inset:0;background:#1B4332;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-logo{width:72px;height:72px;background:#2D6A4F;border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-weight:800;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.splash-nm{color:#fff;font-size:1.2rem;font-weight:700;}
.splash-nm span{color:#52B788;font-weight:400;}
.splash-sub{color:rgba(255,255,255,.5);font-size:.8rem;margin-top:6px;}

/* TOPBAR */
.gf-topbar{background:#fff;border-bottom:1.5px solid #E8E8E4;height:48px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:200;}
.gf-back{display:flex;align-items:center;gap:6px;background:#F4F4F2;border:1px solid #E8E8E4;border-radius:8px;padding:5px 10px;font-size:.72rem;font-weight:600;color:#4A4A46;text-decoration:none;cursor:pointer;white-space:nowrap;}
.gf-back:active{background:#E8E8E4;}
.gf-name{font-size:.82rem;font-weight:700;color:#1C1C1A;}
.gf-name span{color:#2D6A4F;font-weight:400;}
.gf-modulo{font-size:.72rem;font-weight:600;color:#6B7280;background:#F4F4F2;border-radius:6px;padding:3px 8px;}
.gf-sync{display:flex;align-items:center;gap:5px;background:#F4F4F2;border:1px solid #E8E8E4;border-radius:20px;padding:3px 9px;font-size:.62rem;color:#6B7280;font-weight:500;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#52B788;vertical-align:middle;}
.dot.off{background:#f44336;}
.dot.wait{background:var(--warn);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* HEADER */
header{background:linear-gradient(135deg,#2D6A4F 0%,#1B4332 100%);color:#fff;padding:10px 16px 8px;flex-shrink:0;}
.h-top{display:flex;align-items:center;justify-content:space-between;}
.h-top h1{font-size:1.05rem;font-weight:800;color:#fff;}
.h-badge{background:rgba(255,255,255,.18);color:#fff;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.h-sub{font-size:.7rem;color:rgba(255,255,255,.55);margin-top:2px;}
.h-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.h-chip{background:rgba(255,255,255,.12);font-size:.72rem;padding:4px 10px;border-radius:20px;color:rgba(255,255,255,.8);}
.h-chip.hi{background:rgba(255,255,255,.22);color:#fff;font-weight:600;}
.beta-pill{background:rgba(255,255,255,.15);color:#fff;font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:.5px;margin-left:6px;}

/* TABS */
.tabs{display:flex;background:#F4F4F2;flex-shrink:0;padding:6px 10px;gap:4px;}
.tab{flex:1;text-align:center;padding:7px 4px;font-size:.67rem;font-weight:600;color:var(--gray);cursor:pointer;border-radius:8px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab.on{color:var(--grn);background:var(--grn-l);}
.tab-ico{font-size:.85rem;}

/* SCROLL */
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 120px;}
.vw{display:none;}.vw.on{display:block;}

/* CARD BASE */
.card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px;}

/* SETOR PILLS */
.spills{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;flex-wrap:wrap;}
.spills::-webkit-scrollbar{display:none;}
.sp{flex-shrink:0;padding:9px 16px;border-radius:10px;font-size:.78rem;font-weight:700;border:2px solid var(--border);background:var(--white);color:var(--gray);cursor:pointer;transition:.15s;white-space:nowrap;}
.sp.on{color:#fff;border-color:transparent;}
.sp[data-s="PADARIA"].on{background:#1D4ED8;}
.sp[data-s="CONFEITARIA"].on{background:#A93226;}
.sp[data-s="LANCHONETE"].on{background:#2D6A4F;}
.sp[data-s="PASTELARIA"].on{background:#6D28D9;}

/* FILTROS RÁPIDOS */
.quick-filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:10px;}
.quick-filters::-webkit-scrollbar{display:none;}
.qf{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:.7rem;font-weight:700;border:2px solid var(--border);background:var(--white);color:var(--gray);cursor:pointer;transition:.15s;}
.qf.on{background:var(--grn2);color:#fff;border-color:var(--grn2);}
.qf[data-f="critico"].on{background:var(--red);border-color:var(--red);}
.qf[data-f="atencao"].on{background:var(--warn);border-color:var(--warn);}
.qf[data-f="ok"].on{background:var(--grn);border-color:var(--grn);}
.qf[data-f="prio"].on{background:#B45309;border-color:#B45309;}

/* PRODUCT CARD */
.pcard{background:var(--white);border-radius:13px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:9px;border-left:4px solid var(--border);transition:border-color .2s;}
.pcard.status-ok{border-left-color:#22C55E;}
.pcard.status-atencao{border-left-color:#F59E0B;}
.pcard.status-critico{border-left-color:#EF4444;}
.pcard.status-sem-controle{border-left-color:#9CA3AF;}
.pc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.pc-info{flex:1;min-width:0;}
.pc-nome{font-size:.9rem;font-weight:700;line-height:1.3;word-break:break-word;}
.pc-badges{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:4px;}
.pc-badge{font-size:.58rem;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.3px;}
.pc-badge.kg{background:#FDECEA;color:#C0392B;}
.pc-badge.und{background:#FEF3EC;color:#E67E22;}
.pc-badge.prio{background:#FEF3C7;color:#B45309;}
.pc-badge.min{background:var(--grn-l);color:var(--grn2);}
.pc-sem{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.sem-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
.sem-dot.ok{background:#22C55E;}.sem-dot.atencao{background:#F59E0B;}
.sem-dot.critico{background:#EF4444;}.sem-dot.sem-controle{background:#9CA3AF;}
.sem-lbl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.sem-lbl.ok{color:#22C55E;}.sem-lbl.atencao{color:#F59E0B;}
.sem-lbl.critico{color:#EF4444;}.sem-lbl.sem-controle{color:#9CA3AF;}

/* INPUTS CHECKLIST */
.pc-inputs{display:flex;flex-direction:column;gap:8px;}
.pc-input-row{display:flex;align-items:center;gap:8px;}
.pc-input-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--brown2);min-width:62px;}
.pc-input-wrap{flex:1;position:relative;}
.pc-qty{width:100%;height:56px;border:2px solid var(--border);border-radius:10px;font-size:1.3rem;font-weight:700;text-align:center;background:var(--cream);outline:none;color:var(--brown);font-family:inherit;-webkit-appearance:none;}
.pc-qty:focus{border-color:var(--grn);background:#fff;}
.pc-qty.status-ok{border-color:#22C55E;background:#F0FDF4;}
.pc-qty.status-atencao{border-color:#F59E0B;background:#FFFBEB;}
.pc-qty.status-critico{border-color:#EF4444;background:#FEF2F2;}
.pc-unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:.68rem;font-weight:700;color:var(--gray);pointer-events:none;}
.pc-freezer-sep{display:flex;align-items:center;gap:8px;margin:2px 0;}
.pc-freezer-sep::before,.pc-freezer-sep::after{content:'';flex:1;height:1px;background:var(--border);}
.pc-freezer-sep span{font-size:.62rem;color:var(--gray);white-space:nowrap;}
.pc-sugestao{font-size:.7rem;font-weight:600;padding:5px 10px;border-radius:8px;display:none;}
.pc-sugestao.show{display:block;}
.pc-sugestao.critico{background:#FEF2F2;color:#DC2626;}
.pc-sugestao.atencao{background:#FFFBEB;color:#D97706;}
.pc-save{font-size:.6rem;text-align:right;height:14px;transition:.2s;}
.pc-save.saving{color:var(--warn);}.pc-save.saved{color:var(--grn);}
.pc-min-row{display:flex;align-items:center;gap:6px;margin-top:5px;padding:4px 6px;background:var(--grn-ll);border-radius:8px;border:1px solid #C6E6D4;}
.pc-min-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--grn2);white-space:nowrap;}
.pc-min-inp{width:64px;height:30px;border:1.5px solid #C6E6D4;border-radius:7px;font-size:.85rem;font-weight:700;text-align:center;background:#fff;outline:none;color:var(--grn2);font-family:inherit;-webkit-appearance:none;}
.pc-min-inp:focus{border-color:var(--grn);background:#fff;}
.pc-min-saved{font-size:.58rem;color:var(--grn);font-weight:600;transition:.2s;}

/* ORDEM DE PRODUÇÃO */
.ordem-header{background:var(--white);border-radius:12px;padding:14px;box-shadow:var(--sh);margin-bottom:10px;}
.ordem-titulo{font-size:1rem;font-weight:800;color:var(--brown);margin-bottom:4px;}
.ordem-meta{font-size:.72rem;color:var(--gray);margin-bottom:10px;}
.ordem-prog-lbl{display:flex;justify-content:space-between;font-size:.7rem;font-weight:600;color:var(--brown2);margin-bottom:4px;}
.ordem-prog-bar{height:6px;background:var(--grn-l);border-radius:3px;overflow:hidden;}
.ordem-prog-fill{height:100%;background:var(--grn);border-radius:3px;transition:width .3s;}
.ordem-acoes{display:flex;gap:8px;margin-top:10px;}
.btn-print{flex:1;background:var(--gray-l);color:var(--brown);border:none;border-radius:10px;padding:10px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-voltar-home{flex:1;background:var(--grn-l);color:var(--grn2);border:none;border-radius:10px;padding:10px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;}
.ordem-bloco{border-radius:12px;padding:14px;margin-bottom:10px;}
.ordem-bloco.prio-critico{background:var(--gold-ll);border:2px solid #FDE68A;}
.ordem-bloco.produzir{background:var(--red-ll);border:2px solid var(--red-l);}
.ordem-bloco.freezer{background:#EFF6FF;border:2px solid #BFDBFE;}
.ordem-bloco.programar{background:var(--warn-l);border:2px solid #FDE68A;}
.ordem-bloco-ttl{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ordem-bloco.prio-critico .ordem-bloco-ttl{color:var(--gold);}
.ordem-bloco.produzir .ordem-bloco-ttl{color:var(--red2);}
.ordem-bloco.freezer .ordem-bloco-ttl{color:var(--blue);}
.ordem-bloco.programar .ordem-bloco-ttl{color:var(--warn);}
.ordem-bloco.collapsed .ordem-itens{display:none;}
.ordem-item{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.ordem-item:last-child{margin-bottom:0;}
.oi-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.oi-nm{font-size:.88rem;font-weight:700;flex:1;word-break:break-word;}
.oi-status-btn{flex-shrink:0;border:none;border-radius:20px;padding:5px 11px;font-size:.68rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap;}
.oi-status-btn.pendente{background:#FEF3C7;color:#B45309;}
.oi-status-btn.produzindo{background:#DBEAFE;color:#1D4ED8;}
.oi-status-btn.concluido{background:#D1FAE5;color:#065F46;}
.oi-detalhe{display:flex;flex-wrap:wrap;gap:6px;font-size:.72rem;color:var(--brown2);}
.oi-pill{background:var(--cream);border-radius:6px;padding:3px 8px;font-weight:600;}
.oi-pill.sug{background:#FEF2F2;color:#DC2626;font-weight:700;}
.oi-pill.desc{background:#EFF6FF;color:#1D4ED8;font-weight:700;}
.oi-concluido-info{font-size:.62rem;color:var(--gray);margin-top:4px;}

/* PROJEÇÃO */
.proj-nav{display:flex;align-items:center;justify-content:space-between;background:var(--white);border-radius:12px;padding:12px 14px;box-shadow:var(--sh);margin-bottom:10px;}
.proj-nav-btn{background:var(--gray-l);border:none;border-radius:8px;width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.proj-nav-btn:active{background:var(--border);}
.proj-semana-lbl{font-size:.85rem;font-weight:700;text-align:center;flex:1;}
.proj-semana-sub{font-size:.65rem;color:var(--gray);text-align:center;margin-top:2px;}
.proj-acoes{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.proj-btn{flex:1;min-width:100px;background:var(--gray-l);color:var(--brown);border:none;border-radius:9px;padding:9px 10px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.proj-btn.gr{background:var(--grn-l);color:var(--grn2);}
.proj-btn:active{opacity:.7;}
.proj-aviso{background:var(--warn-l);border-left:3px solid var(--warn);border-radius:8px;padding:10px 12px;font-size:.75rem;color:#92400E;margin-bottom:10px;line-height:1.5;}
.proj-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px;border-radius:12px;box-shadow:var(--sh);}
.proj-table{border-collapse:collapse;width:100%;min-width:560px;background:var(--white);border-radius:12px;overflow:hidden;}
.proj-table th{background:var(--grn2);color:#fff;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:9px 8px;text-align:center;white-space:nowrap;}
.proj-table th.col-nome{text-align:left;padding-left:12px;min-width:130px;}
.proj-table th.col-total{background:#276240;}
.proj-table td{padding:6px 6px;text-align:center;border-bottom:1px solid var(--border);font-size:.8rem;vertical-align:middle;}
.proj-table td.col-nome{text-align:left;padding-left:12px;font-size:.78rem;font-weight:600;word-break:break-word;line-height:1.3;}
.proj-table td.col-total{font-weight:700;color:var(--grn2);background:var(--grn-l);}
.proj-table tr.prio td{background:var(--grn-ll);}
.proj-table tr.total-row td{background:var(--gray-l);font-weight:700;font-size:.75rem;}
.proj-table tr:last-child td{border-bottom:none;}
.proj-inp{width:48px;height:34px;border:1.5px solid var(--border);border-radius:7px;font-size:.85rem;font-weight:700;text-align:center;background:var(--cream);outline:none;color:var(--brown);font-family:inherit;-webkit-appearance:none;}
.proj-inp:focus{border-color:var(--grn);background:#fff;}
.proj-inp.zero{background:#FFFBEB;border-color:#FDE68A;color:#D97706;}
.proj-inp.tem-valor{background:#F0FDF4;border-color:#86EFAC;color:var(--grn2);}
.proj-inp.sugestao{border-color:#C6E6D4;color:#9CA3AF;background:#F9FEFF;font-style:italic;}
.proj-cat-hdr td{background:var(--gray-ll);font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gray);padding:6px 12px;border-bottom:1px solid var(--border);}
.proj-intel-bar{display:flex;align-items:center;gap:8px;background:var(--grn-ll);border:1.5px solid #C6E6D4;border-radius:10px;padding:8px 12px;margin-bottom:10px;flex-wrap:wrap;}
.proj-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:700;white-space:nowrap;}
.proj-badge.aprendendo{background:#EDE9FE;color:#5B21B6;}
.proj-badge.calibrado{background:var(--grn-l);color:var(--grn2);}
.proj-badge.completo{background:#DBEAFE;color:#1E40AF;}
.proj-badge.manual{background:var(--gray-l);color:var(--gray);}
.proj-badge.abc{background:#FEF3C7;color:#92400E;}
.proj-conf-chip{font-size:.58rem;color:var(--gray);font-weight:500;margin-left:auto;}
.proj-meta-inp{width:52px;height:30px;border:1.5px solid #C6E6D4;border-radius:7px;font-size:.78rem;font-weight:700;text-align:center;background:var(--grn-ll);outline:none;color:var(--grn2);font-family:inherit;-webkit-appearance:none;}
.proj-meta-inp:focus{border-color:var(--grn);background:#fff;}
.proj-abc-area{display:flex;align-items:center;gap:10px;background:var(--gold-ll);border:1.5px dashed var(--gold);border-radius:10px;padding:9px 12px;margin-bottom:10px;cursor:pointer;transition:.15s;}
.proj-abc-area:hover{background:var(--warn-l);}
.proj-abc-ico{font-size:1.3rem;flex-shrink:0;}
.proj-abc-ttl{font-size:.78rem;font-weight:700;color:var(--gold);display:block;}
.proj-abc-sub{font-size:.62rem;color:var(--brown2);display:block;margin-top:1px;}
.saz-badge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:12px;background:#FEF3C7;color:#92400E;flex-shrink:0;}
.proj-table th.col-meta{background:#276240;min-width:58px;}
.proj-table td.col-meta{background:var(--grn-ll);padding:4px;}

/* HISTÓRICO */
.hist-filt{background:var(--white);border-radius:12px;padding:12px;box-shadow:var(--sh);margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.hist-filt>div{flex:1;min-width:110px;}
.hist-filt label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--brown2);display:block;margin-bottom:4px;}
.hist-filt input,.hist-filt select{border:2px solid var(--border);border-radius:8px;padding:7px 9px;font-size:.82rem;background:var(--cream);outline:none;width:100%;font-family:inherit;color:var(--brown);}
.hist-filt input:focus,.hist-filt select:focus{border-color:var(--grn);}
.hist-filt-btns{display:flex;gap:6px;align-self:flex-end;}
.hist-filt-btn{border:none;border-radius:8px;padding:8px 12px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.hist-filt-btn.ap{background:var(--brown);color:#fff;}
.hist-filt-btn.cl{background:var(--gray-l);color:var(--brown);}
.hist-card{background:var(--white);border-radius:12px;padding:14px;box-shadow:var(--sh);margin-bottom:10px;cursor:pointer;border-left:4px solid var(--border);}
.hist-card.finalizado{border-left-color:var(--grn);}
.hist-card.em_andamento{border-left-color:var(--warn);}
.hist-card.cancelado{border-left-color:var(--gray);}
.hist-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.hist-card-info{flex:1;}
.hist-card-ttl{font-size:.9rem;font-weight:700;}
.hist-card-sub{font-size:.7rem;color:var(--gray);margin-top:2px;}
.hist-card-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.hbadge{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:6px;}
.hbadge.crit{background:var(--red-l);color:var(--red2);}
.hbadge.aten{background:var(--warn-l);color:var(--warn);}
.hbadge.ok{background:var(--grn-l);color:var(--grn);}
.hbadge.gray{background:var(--gray-l);color:var(--gray);}
.hist-detalhe{display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}

.cfg-select:disabled{opacity:.45;cursor:not-allowed;}
/* Toggle */
.tgl{position:relative;width:38px;height:21px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;position:absolute;}
.tgl-sl{position:absolute;inset:0;background:#CBD5E1;border-radius:21px;cursor:pointer;transition:.2s;}
.tgl-sl:before{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}

// ═══ UTILS ═══
function normalizar(str){return(str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function toISO(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),di=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${di}`;}
function fmtDate(iso){if(!iso)return'—';try{const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}catch(e){return iso;}}
function hoje(){return toISO(new Date());}
function inicioSemana(d){const dt=new Date(d);const day=dt.getDay();const diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return toISO(dt);}
function addDias(iso,n){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return toISO(d);}
function diaDaSemana(iso){const d=new Date(iso+'T12:00:00');const dow=d.getDay();return dow===0?6:dow-1;}
function duracao(ini,fim){if(!ini||!fim)return'—';const ms=new Date(fim)-new Date(ini);const m=Math.round(ms/60000);if(m<60)return m+'min';return Math.floor(m/60)+'h'+String(m%60).padStart(2,'0')+'min';}
function ekFromKey(key){return key.replace(/[^a-zA-Z0-9_-]/g,'_');}

function semaforo(qtd,min,tipo){
  const n=parseFloat(qtd)||0,mn=parseFloat(min)||0;
  if(!mn)return'sem-controle';const pct=n/mn;
  if(tipo==='freezer'){if(pct>=1)return'ok';if(pct>=0.5)return'atencao';return'critico';}
  if(pct>=1)return'ok';if(pct>=0.8)return'atencao';return'critico';
}
function semLabel(st){return{ok:'OK',atencao:'ATENÇÃO',critico:'CRÍTICO','sem-controle':'SEM CONTROLE'}[st]||st;}
function sugestao(qtd,min){const n=parseFloat(qtd)||0,mn=parseFloat(min)||0;return mn?Math.max(0,mn*2-n):0;}

function setSyncUI(st){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');
  if(!dot)return;
  if(st==='ok'){dot.className='dot';dot.style.background='#4CAF50';txt.textContent='Sincronizado';}
  else if(st==='err'){dot.className='dot off';dot.style.background='';txt.textContent='Offline';}
  else{dot.className='dot wait';dot.style.background='';txt.textContent='...';}
}

function toast(msg,t=''){const el=document.getElementById('tst');el.textContent=msg;el.className='tst on'+(t?' '+t:'');setTimeout(()=>el.className='tst',2800);}

let _confResolve=null;
function confirmar(msg,titulo,ico,okTxt,okVerde){
  titulo=titulo||'Confirmar';ico=ico||'⚠️';okTxt=okTxt||'Confirmar';
  return new Promise(resolve=>{
    _confResolve=resolve;
    document.getElementById('confIco').textContent=ico;
    document.getElementById('confTtl').textContent=titulo;
    document.getElementById('confMsg').textContent=msg;
    const ok=document.getElementById('confOk');
    ok.textContent=okTxt;ok.className='conf-ok'+(okVerde?'':' red');
    document.getElementById('confOv').classList.add('on');
  });
}
function confResp(v){document.getElementById('confOv').classList.remove('on');if(_confResolve)_confResolve(v);_confResolve=null;}

}

async function aplicarProdutosPrio(){
  // Buscar produtos do Supabase para vincular por nome ilike
  const [padProds,confProds]=await Promise.all([
    sbSelect('produtos','ativo=eq.true&setor=eq.PADARIA&limit=500').catch(()=>[]),
    sbSelect('produtos','ativo=eq.true&setor=eq.CONFEITARIA&limit=500').catch(()=>[])
  ]);
  const allProds=[...(padProds||[]),...(confProds||[])];
  const rows=[];
  for(const cfg of PRODS_PRIO){
    const match=allProds.find(p=>(p.nome||'').toUpperCase().trim()===cfg.nome.toUpperCase().trim());
    rows.push({
      produto_id:match?String(match.id||''):'',
      produto_nome:cfg.nome,setor:cfg.setor,
      tem_freezer:cfg.tem_freezer||false,
      unidade_checklist:cfg.unidade_checklist||'kg',
      gramas_por_pacote:cfg.gramas_por_pacote||0,
      qtd_minima_gondola:cfg.qtd_minima_gondola||0,
      qtd_minima_freezer:cfg.qtd_minima_freezer||0,
      prioritario:cfg.prioritario||false,ativo:true
    });
  }
  if(rows.length)await sbUpsert('checklist_config',rows).catch(()=>{});
}

async function iniciarChecklist(){
  const btn=document.getElementById('btnIniciar');if(btn)btn.disabled=true;setSyncUI('wait');
  try{
    const existentes=await sbSelect('checklist_sessoes',`data=eq.${DATA}&setor=eq.${encodeURIComponent(SETOR)}&turno=eq.${TURNO}&status=eq.em_andamento&order=iniciado_em.desc&limit=1`);
    if(existentes&&existentes.length){
      const s=existentes[0];
      const continuar=await confirmar(`Existe um checklist em andamento de ${fmtDate(s.data)} — ${s.turno==='MANHA'?'Manhã':'Noite'}.\n\nDeseja continuar o anterior?`,'Checklist em Andamento','📋','Continuar',true);
      if(continuar){SESSAO_ATIVA=s;await carregarProdutos();await carregarRegistrosExistentes();mostrarChecklist();setSyncUI('ok');return;}
      else await sbPatch('checklist_sessoes',`id=eq.${s.id}`,{status:'cancelado'});
    }
    const [sess]=await sbInsert('checklist_sessoes',{data:DATA,turno:TURNO,responsavel_id:GF_USER?String(GF_USER.id||''):'',responsavel_nome:GF_USER?GF_USER.nome:'',setor:SETOR,status:'em_andamento',iniciado_em:new Date().toISOString()});
    SESSAO_ATIVA=sess;await carregarProdutos();REGISTROS={};salvarRascunho();mostrarChecklist();setSyncUI('ok');
  }catch(e){console.error(e);toast('Erro ao iniciar: '+e.message,'er');if(btn)btn.disabled=false;setSyncUI('err');}

async function carregarRegistrosExistentes(){

    REGISTROS={};
    (regs||[]).forEach(r=>{const key=r.produto_id||r.produto_nome;REGISTROS[key]={id:r.id,qtd_gondola:r.qtd_gondola||0,qtd_freezer:r.qtd_freezer||0,saved:true};});
  }catch(e){console.warn(e);}
}

async function carregarProdutos(){
  const prods=await sbSelect('produtos',`ativo=eq.true&setor=eq.${encodeURIComponent(SETOR)}&order=nome.asc&limit=500`);
  PRODUTOS=prods||[];
  const cfgs=await sbSelect('checklist_config',`setor=eq.${encodeURIComponent(SETOR)}&ativo=eq.true&limit=500`).catch(()=>[]);
  CHK_CONFIG={};(cfgs||[]).forEach(c=>{CHK_CONFIG[c.produto_id||c.produto_nome]=c;});
  // Fallback: preferir config salva pelo nome quando ela tem mais dados (prioritario, min) que a por ID
  const cfgByNome={};Object.values(CHK_CONFIG).forEach(c=>{if(c.produto_nome)cfgByNome[c.produto_nome.toUpperCase()]=c;});
  PRODUTOS.forEach(p=>{
    const key=String(p.id||p.nome);
    const byId=CHK_CONFIG[key],byNome=cfgByNome[p.nome.toUpperCase()];
    if(!byNome)return;
    if(!byId||(byNome.prioritario&&!byId.prioritario)||(byNome.qtd_minima_gondola>0&&!byId.qtd_minima_gondola)){
      CHK_CONFIG[key]=byNome;
    }
  });
  const novas=[];
  for(const p of PRODUTOS){
    const key=String(p.id||p.nome);
    if(!CHK_CONFIG[key])novas.push({produto_id:String(p.id||''),produto_nome:p.nome,setor:p.setor||SETOR,tem_freezer:false,unidade_checklist:p.unidade||'und',qtd_minima_gondola:0,qtd_minima_freezer:0,prioritario:false,ativo:true});
  }
  if(novas.length){
    try{const criadas=await sbInsert('checklist_config',novas);(criadas||[]).forEach(c=>{CHK_CONFIG[c.produto_id||c.produto_nome]=c;});}
    catch(e){novas.forEach(c=>{CHK_CONFIG[c.produto_id||c.produto_nome]=c;});}
  }
  // Aplicar PRODS_PRIO diretamente por nome exato — fonte de verdade para prioritario e minimos
  const prioByNome={};
  PRODS_PRIO.filter(pp=>pp.setor===SETOR).forEach(pp=>{prioByNome[pp.nome.toUpperCase()]=pp;});
  PRODUTOS.forEach(p=>{
    const pp=prioByNome[p.nome.toUpperCase()];if(!pp)return;
    const key=String(p.id||p.nome);
    if(!CHK_CONFIG[key])CHK_CONFIG[key]={produto_id:key,produto_nome:p.nome,setor:SETOR,ativo:true};
    if(pp.prioritario&&!CHK_CONFIG[key].prioritario)CHK_CONFIG[key].prioritario=true;
    if(pp.qtd_minima_gondola&&!CHK_CONFIG[key].qtd_minima_gondola)CHK_CONFIG[key].qtd_minima_gondola=pp.qtd_minima_gondola;
    if(pp.qtd_minima_freezer&&!CHK_CONFIG[key].qtd_minima_freezer)CHK_CONFIG[key].qtd_minima_freezer=pp.qtd_minima_freezer;
    if(pp.tem_freezer&&!CHK_CONFIG[key].tem_freezer)CHK_CONFIG[key].tem_freezer=pp.tem_freezer;
    if(pp.unidade_checklist&&(!CHK_CONFIG[key].unidade_checklist||CHK_CONFIG[key].unidade_checklist==='und'))CHK_CONFIG[key].unidade_checklist=pp.unidade_checklist;
  });
  PRODUTOS.sort((a,b)=>{
    const ka=String(a.id||a.nome),kb=String(b.id||b.nome);
    const pa=(CHK_CONFIG[ka]&&CHK_CONFIG[ka].prioritario)?1:0,pb=(CHK_CONFIG[kb]&&CHK_CONFIG[kb].prioritario)?1:0;
    if(pb!==pa)return pb-pa;return(a.nome||'').localeCompare(b.nome||'','pt-BR');
  });
}

function mostrarChecklist(){
  document.getElementById('v-home').style.display='none';
  document.getElementById('v-chklist').style.display='';
  document.getElementById('v-ordem').style.display='none';

function sortKeyProd(p){
  const key=String(p.id||p.nome),cfg=CHK_CONFIG[key]||{},reg=REGISTROS[key]||{};
  const isPrio=cfg.prioritario||false;
  const st=semaforo(reg.qtd_gondola||0,cfg.qtd_minima_gondola||0,'gondola');
  const sr=st==='critico'?0:st==='atencao'?1:st==='ok'?2:3;
  return (isPrio?0:4)+sr;
}
function renderChecklist(){
  updateKpi();let lista=filtrarProdutos();const el=document.getElementById('chkList');
  if(!lista.length){const q=normalizar(BUSCA_CHK);el.innerHTML=`<div class="emp"><div class="big">🔍</div><p>${q?`Nenhum produto encontrado para "<strong>${BUSCA_CHK}</strong>"`:'Nenhum produto neste filtro.'}</p></div>`;return;}
  lista=lista.slice().sort((a,b)=>{const d=sortKeyProd(a)-sortKeyProd(b);return d!==0?d:(a.nome||'').localeCompare(b.nome||'','pt-BR');});
  el.innerHTML=lista.map(p=>cardProduto(p)).join('');
}

          ${isPrio?'<span class="pc-badge prio">Prioritário</span>':''}
        </div>

      <div class="pc-sem">

    <div class="pc-inputs">
      <div class="pc-input-row">
        <div class="pc-input-lbl">🏪 Gôndola</div>

          <input class="pc-qty${touched?' status-'+stG:''}" type="number" inputmode="numeric" min="0" step="1"
            id="g-${ek}" value="${qtdG||''}" placeholder="0"
            oninput="onInput('${key}','g',this.value)" onfocus="this.select()">
          <span class="pc-unit">${unit}</span>

        <span class="pc-min-saved" id="msv-g-${ek}"></span>

        </div>
      </div>
      <div class="pc-min-row">
        <span class="pc-min-lbl">Mín câmara:</span>
        <input class="pc-min-inp" type="number" inputmode="numeric" min="0" step="1"
          id="minf-${ek}" value="${minF||0}"
          onchange="salvarMin('${key}','f',this.value)" onfocus="this.select()">
        <span class="pc-min-lbl" style="font-weight:400;text-transform:none;letter-spacing:0;">${unit}</span>

function setFiltro(f){FILTRO=f;document.querySelectorAll('.qf').forEach(el=>el.classList.toggle('on',el.dataset.f===f));renderChecklist();}
function filtrarProdutos(){
  const q=normalizar(BUSCA_CHK);
  const cl=document.getElementById('chkBuscaClear');if(cl)cl.style.display=q?'':'none';
  return PRODUTOS.filter(p=>{
    const key=String(p.id||p.nome),cfg=CHK_CONFIG[key]||{},reg=REGISTROS[key]||{};
    const stG=semaforo(reg.qtd_gondola||0,cfg.qtd_minima_gondola||0,'gondola');
    if(q&&!normalizar(p.nome).includes(q))return false;
    if(FILTRO==='todos')return true;if(FILTRO==='prio')return cfg.prioritario||false;
    if(FILTRO==='critico')return stG==='critico';if(FILTRO==='atencao')return stG==='atencao';
    if(FILTRO==='ok')return stG==='ok';return true;
  });
}
function updateKpi(){
  let criticos=0,atencao=0,ok=0;
  PRODUTOS.forEach(p=>{
    const key=String(p.id||p.nome),cfg=CHK_CONFIG[key]||{},reg=REGISTROS[key]||{};
    const st=semaforo(reg.qtd_gondola||0,cfg.qtd_minima_gondola||0,'gondola');
    if(st==='critico')criticos++;else if(st==='atencao')atencao++;else if(st==='ok')ok++;
  });
  document.getElementById('chkKpi').innerHTML=`
    <div class="kpi"><div class="kpi-val" style="color:var(--red)">${criticos}</div><div class="kpi-lbl">🔴 Crítico</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--warn)">${atencao}</div><div class="kpi-lbl">🟡 Atenção</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--grn)">${ok}</div><div class="kpi-lbl">✅ OK</div></div>`;
}

function onInput(key,tipo,val){
  if(!REGISTROS[key])REGISTROS[key]={qtd_gondola:0,qtd_freezer:0,saved:false};
  const n=parseFloat(val)||0;
  if(tipo==='g')REGISTROS[key].qtd_gondola=n;else REGISTROS[key].qtd_freezer=n;
  REGISTROS[key].saved=false;atualizarCard(key);updateFooter();updateHeader();salvarRascunho();
  clearTimeout(_saveTimers[key]);_saveTimers[key]=setTimeout(()=>salvarRegistro(key),700);
  scheduleReorder();
}

function atualizarCard(key){
  const ek=ekFromKey(key),cfg=CHK_CONFIG[key]||{},reg=REGISTROS[key]||{};
  const minG=parseFloat(cfg.qtd_minima_gondola)||0,minF=parseFloat(cfg.qtd_minima_freezer)||0;
  const qtdG=reg.qtd_gondola||0,qtdF=reg.qtd_freezer||0,temF=cfg.tem_freezer||false;
  const stG=semaforo(qtdG,minG,'gondola'),stF=temF?semaforo(qtdF,minF,'freezer'):'sem-controle';
  const touched=qtdG>0||qtdF>0;
  const stGeral=touched?(stG==='critico'||stF==='critico'?'critico':stG==='atencao'||stF==='atencao'?'atencao':'ok'):'sem-controle';
  const unit=cfg.unidade_checklist||'und',sugG=sugestao(qtdG,minG);
  const gp2=parseFloat(cfg.gramas_por_pacote)||0;
  const card=document.getElementById('pcard-'+ek);if(!card)return;
  card.className=`pcard status-${stGeral}`;
  const dot=document.getElementById('dot-'+ek),lbl=document.getElementById('lbl-'+ek);
  if(dot)dot.className='sem-dot '+stG;
  if(lbl){lbl.className='sem-lbl '+stG;lbl.textContent=semLabel(stG);}
  const ig=document.getElementById('g-'+ek);if(ig)ig.className=`pc-qty status-${stG}`;
  const iff=document.getElementById('f-'+ek);if(iff)iff.className=`pc-qty status-${stF}`;
  const sug=document.getElementById('sug-'+ek);
  if(sug){if(sugG>0&&minG){sug.textContent=`📦 Sugestão: produzir ${sugG} ${unit==='pacote'?'pac':unit}${unit==='pacote'&&gp2?` (≈${(sugG*gp2/1000).toFixed(1)}kg)`:''}`;sug.className=`pc-sugestao show ${stG}`;}else sug.className='pc-sugestao';}
}

async function salvarMin(key,tipo,val){
  const n=parseFloat(val)||0;
  if(!CHK_CONFIG[key])CHK_CONFIG[key]={};
  const cfg=CHK_CONFIG[key];
  if(tipo==='g')cfg.qtd_minima_gondola=n;else cfg.qtd_minima_freezer=n;
  const ek=ekFromKey(key);
  const el=document.getElementById('msv-'+(tipo==='g'?'g':'f')+'-'+ek);
  if(el){el.textContent='Salvando…';}
  const p=PRODUTOS.find(x=>String(x.id||x.nome)===key);
  const row={produto_id:String(p?.id||''),produto_nome:p?.nome||key,
    setor:cfg.setor||SETOR,tem_freezer:cfg.tem_freezer||false,
    unidade_checklist:cfg.unidade_checklist||'und',
    gramas_por_pacote:cfg.gramas_por_pacote||0,

function semanaDoMes(dateStr){

}

function calcSazonalidade(){
  if(!ABC_VENDAS.length){IDX_SAZONALIDADE={};return;}
  const totSem={1:0,2:0,3:0,4:0},cntSem={1:0,2:0,3:0,4:0};
  ABC_VENDAS.forEach(r=>{
    const sem=semanaDoMes(r.data);
    if(sem>=1&&sem<=4){totSem[sem]+=r.quantidade||0;cntSem[sem]++;}
  });
  const medias={};let totalMedia=0,cnt=0;
  for(let s=1;s<=4;s++){if(cntSem[s]>0){medias[s]=totSem[s]/cntSem[s];totalMedia+=medias[s];cnt++;}}
  const mediaGeral=cnt>0?totalMedia/cnt:1;
  for(let s=1;s<=4;s++){IDX_SAZONALIDADE[s]=medias[s]&&mediaGeral?Math.round(medias[s]/mediaGeral*100)/100:1;}
}
function idxSazonalidade(){
  const sem=semanaDoMes(SEMANA_INICIO);return IDX_SAZONALIDADE[sem]||1;
}
function parseABCCsv(text){
  const lines=text.trim().split(/\r?\n/);
  const isHeader=lines[0]&&(lines[0].toLowerCase().includes('data')||lines[0].toLowerCase().includes('nome')||lines[0].toLowerCase().includes('produto'));
  const rows=[];
  (isHeader?lines.slice(1):lines).forEach(line=>{
    const parts=line.split(';');if(parts.length<5)return;
    const dataStr=(parts[0]||'').trim(),dia_semana=(parts[1]||'').trim();
    const cod=(parts[2]||'').trim(),nome=(parts[3]||'').trim();
    const qtd=parseFloat((parts[4]||'').replace(',','.'));
    const fat=parseFloat((parts[5]||'').replace(',','.'));
    const classif=(parts[parts.length-1]||'').trim().replace('\r','');
    if(!dataStr||!nome||isNaN(qtd))return;
    const [d,m,y]=dataStr.split('/');
    const iso=y&&m&&d?`${y.trim()}-${m.trim().padStart(2,'0')}-${d.trim().padStart(2,'0')}`:'';
    if(!iso)return;
    rows.push({data:iso,dia_semana,produto_cod:cod,produto_nome:nome,quantidade:qtd||0,faturamento:isNaN(fat)?0:fat,classificacao:classif});
  });
  return rows;
}
async function onFilesABC(files){
  if(!files||!files.length)return;
  toast('Processando CSV(s)...','wa');
  let allRows=[];
  for(const file of files){
    try{const text=await file.text();allRows=allRows.concat(parseABCCsv(text));}catch(e){console.warn(e);}
  }
  if(!allRows.length){toast('Nenhum dado válido encontrado','er');return;}
  const batchSize=500;let saved=0;
  for(let i=0;i<allRows.length;i+=batchSize){
    try{await sbInsert('abc_vendas',allRows.slice(i,i+batchSize).map(r=>({...r,criado_em:new Date().toISOString()})));saved+=Math.min(batchSize,allRows.length-i);}catch(e){console.warn(e);}
  }
  ABC_VENDAS=[...ABC_VENDAS,...allRows];
  calcSazonalidade();
  toast(`✅ ${saved} linhas importadas!`,'ok');
  await renderProjecao();
}
function distribuirMeta(key,meta){
  const d=PROJECAO_DATA[key]||{};
  const total=DIAS_SEMANA.reduce((s,dk)=>s+(d[dk]||0),0);
  const novoD={};
  if(total>0){
    DIAS_SEMANA.forEach(dk=>{novoD[dk]=Math.round(meta*(d[dk]||0)/total);});
  }else{
    const diasUteis=['seg','ter','qua','qui','sex','sab'];
    const porDia=Math.round(meta/diasUteis.length);
    DIAS_SEMANA.forEach(dk=>{novoD[dk]=diasUteis.includes(dk)?porDia:0;});
  }
  const soma=DIAS_SEMANA.reduce((s,dk)=>s+(novoD[dk]||0),0);
  const diff=meta-soma;if(diff!==0)novoD.seg=Math.max(0,(novoD.seg||0)+diff);
  return novoD;
}
async function onMetaChange(key,val){
  const meta=parseFloat(val)||0;
  const storeKey=SETOR+'_'+key;
  META_SEMANAL[storeKey]=meta;
  localStorage.setItem('gf_meta_semanal',JSON.stringify(META_SEMANAL));
  if(meta>0){
    PROJECAO_DATA[key]=distribuirMeta(key,meta);
    PROJECAO_AUTO[key]=false;
    const p=PRODUTOS.find(x=>String(x.id||x.nome)===key),cfg=CHK_CONFIG[key]||{};
    const d=PROJECAO_DATA[key];
    const row={semana_inicio:SEMANA_INICIO,setor:SETOR,produto_id:String(p?p.id||'':''),produto_nome:p?p.nome:key,unidade:cfg.unidade_checklist||'und',seg:d.seg||0,ter:d.ter||0,qua:d.qua||0,qui:d.qui||0,sex:d.sex||0,sab:d.sab||0,dom:d.dom||0,gerado_automatico:false};
    try{const[salvo]=await sbUpsert('projecao_semanal',[row]);if(salvo)PROJECAO_IDS[key]=salvo.id;}catch(e){console.warn(e);}
    await renderProjecao();
    toast(`📊 Meta ${meta} distribuída pela semana`,'ok');
  }
}

async function gerarProjecaoAutomatica(mostrarToast){
  const de=toISO(new Date(Date.now()-30*24*60*60*1000));
  let regs=[];
  try{regs=await sbSelect('checklist_registros',`setor=eq.${encodeURIComponent(SETOR)}&salvo_em=gte.${de}T00:00:00&limit=5000`);}catch(e){regs=[];}
  const acc={};
  (regs||[]).forEach(r=>{
    const key=r.produto_id||r.produto_nome;if(!key)return;
    const dow=diaDaSemana((r.salvo_em||'').substring(0,10));
    if(!acc[key])acc[key]={0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
    if(r.sugestao_producao>0)acc[key][dow].push(r.sugestao_producao);
  });
  const idxSaz=idxSazonalidade();
  PROJECAO_DATA={};PROJECAO_AUTO={};
  for(const p of PRODUTOS){
    const key=String(p.id||p.nome),cfg=CHK_CONFIG[key]||{},fator=(cfg.prioritario?1.2:1);
    const diasObj={seg:0,ter:0,qua:0,qui:0,sex:0,sab:0,dom:0};
    let temDados=false;
    if(acc[key]){DIAS_SEMANA.forEach((d,i)=>{const arr=acc[key][i]||[];if(arr.length){const media=arr.reduce((a,b)=>a+b,0)/arr.length;diasObj[d]=Math.round(media*fator*idxSaz);temDados=true;}});}
    PROJECAO_DATA[key]=diasObj;
    if(temDados)PROJECAO_AUTO[key]=true;
  }
  const temHistorico=Object.keys(acc).length>0;
  if(!temHistorico&&mostrarToast){toast('Sem histórico — preencha manualmente','wa');return;}
  const rowsUps=PRODUTOS.map(p=>{const key=String(p.id||p.nome),d=PROJECAO_DATA[key]||{},cfg=CHK_CONFIG[key]||{};return{semana_inicio:SEMANA_INICIO,setor:SETOR,produto_id:String(p.id||''),produto_nome:p.nome,unidade:(cfg.unidade_checklist)||p.unidade||'und',seg:d.seg||0,ter:d.ter||0,qua:d.qua||0,qui:d.qui||0,sex:d.sex||0,sab:d.sab||0,dom:d.dom||0,responsavel_nome:GF_USER?GF_USER.nome:'',gerado_automatico:true};});
  if(rowsUps.length){try{const salvos=await sbUpsert('projecao_semanal',rowsUps);(salvos||[]).forEach(r=>{const key=r.produto_id||r.produto_nome;PROJECAO_IDS[key]=r.id;});if(mostrarToast)toast('🔄 Projeção gerada!','ok');}catch(e){console.warn(e);}}
}

function filtrarTabelaProj(busca){
  const q=normalizar(busca);
  const tbody=document.querySelector('#projConteudo .proj-table tbody');
  if(!tbody)return;
  const rows=[...tbody.querySelectorAll('tr')];
  const catVisiveis={};
  // Primeira passagem: mostrar/ocultar linhas de produto
  rows.forEach(tr=>{
    if(tr.dataset.nome!==undefined&&!tr.classList.contains('total-row')){
      const visivel=!q||normalizar(tr.dataset.nome).includes(q);
      tr.style.display=visivel?'':'none';
      if(visivel&&tr.dataset.cat)catVisiveis[tr.dataset.cat]=true;
    }
  });
  // Segunda passagem: mostrar/ocultar cabeçalhos de categoria
  rows.forEach(tr=>{
    if(tr.dataset.cat!==undefined&&!tr.dataset.nome){
      tr.style.display=(!q||catVisiveis[tr.dataset.cat])?'':'none';
    }
  });
  // Recalcular totais a partir de linhas visíveis
  const totalRow=tbody.querySelector('tr.total-row');
  if(!totalRow)return;
  const totaisDia=Array(7).fill(0);
  rows.forEach(tr=>{
    if(!tr.dataset.nome||tr.style.display==='none')return;
    tr.querySelectorAll('input.proj-inp').forEach((inp,i)=>{totaisDia[i]+=(parseFloat(inp.value)||0);});
  });
  const hojeISO=hoje(),diasDatas=DIAS_SEMANA.map((d,i)=>addDias(SEMANA_INICIO,i));
  const totalGeral=totaisDia.reduce((a,b)=>a+b,0);
  const tds=totalRow.querySelectorAll('td');
  // tds[0]=nome, tds[1..7]=dias, tds[8]=total, tds[9]=meta
  totaisDia.forEach((v,i)=>{if(tds[i+1])tds[i+1].textContent=v||'—';});
  if(tds[8])tds[8].textContent=totalGeral||'—';
  // Se nenhum produto visível, mostrar mensagem
  const algumVisivel=rows.some(tr=>tr.dataset.nome!==undefined&&!tr.classList.contains('total-row')&&tr.style.display!=='none');
  let semResultado=tbody.querySelector('.proj-sem-resultado');
  if(!algumVisivel){
    if(!semResultado){
      semResultado=document.createElement('tr');semResultado.className='proj-sem-resultado';
      semResultado.innerHTML=`<td colspan="10" style="text-align:center;padding:20px;color:#6B7280;font-size:.82rem;">Nenhum produto encontrado para "<strong>${busca}</strong>"</td>`;
      tbody.insertBefore(semResultado,totalRow);
    }
  }else{
    if(semResultado)semResultado.remove();
  }
}

async function salvarCelaProj(key,dia,val){
  const n=parseFloat(val)||0;
  if(!PROJECAO_DATA[key])PROJECAO_DATA[key]={seg:0,ter:0,qua:0,qui:0,sex:0,sab:0,dom:0};
  PROJECAO_DATA[key][dia]=n;
  clearTimeout(_projSaveTimers[key+dia]);
  _projSaveTimers[key+dia]=setTimeout(async()=>{
    const p=PRODUTOS.find(x=>String(x.id||x.nome)===key),cfg=CHK_CONFIG[key]||{},d=PROJECAO_DATA[key]||{};
    const row={semana_inicio:SEMANA_INICIO,setor:SETOR,produto_id:String(p?p.id||'':''),produto_nome:p?p.nome:key,unidade:(cfg.unidade_checklist)||'und',seg:d.seg||0,ter:d.ter||0,qua:d.qua||0,qui:d.qui||0,sex:d.sex||0,sab:d.sab||0,dom:d.dom||0,gerado_automatico:false};
    try{const[salvo]=await sbUpsert('projecao_semanal',[row]);if(salvo)PROJECAO_IDS[key]=salvo.id;}catch(e){console.warn(e);}
  },800);
}

async function copiarSemanaAnterior(){

  try{

    const novos=rows.map(r=>{const obj=Object.assign({},r);delete obj.id;delete obj.criado_em;obj.semana_inicio=SEMANA_INICIO;obj.gerado_automatico=false;return obj;});
    const salvos=await sbUpsert('projecao_semanal',novos);

    toast('📋 Semana anterior copiada!','ok');await renderProjecao();
  }catch(e){toast('Erro: '+e.message,'er');}
  setSyncUI('ok');
}

    // Agrupar por categoria
    const grupos={};
    (prods||[]).forEach(p=>{const cat=p.categoria||p.setor||CFG_SETOR_VIEW;if(!grupos[cat])grupos[cat]=[];grupos[cat].push(p);});

    Object.entries(grupos).forEach(([cat,lista])=>{
      html+=`<div class="cfg-cat-hdr">${cat}</div>`;
      lista.forEach(p=>{
        const key=String(p.id||p.nome);
        const cfg=cfgMap[key]||{qtd_minima_gondola:0,qtd_minima_freezer:0,tem_freezer:false,prioritario:false,ativo:true,unidade_checklist:p.unidade||'und'};
        const ek=ekFromKey(key);
        html+=`<div class="cfg-prod-row" id="cfgpr-${ek}">
          <div class="cfg-prod-nm">${p.nome}</div>
          <div class="cfg-row">
            <label>Ativo no checklist</label>
            <label class="tgl"><input type="checkbox" id="cfa-${ek}" ${cfg.ativo!==false?'checked':''} ${dis?'disabled':''} onchange="cfgSalvar('${key}','${p.nome}','ativo',this.checked)"><span class="tgl-sl"></span></label>
          </div>
          <div class="cfg-row">
            <label>⭐ Prioritário</label>
            <label class="tgl"><input type="checkbox" id="cfp-${ek}" ${cfg.prioritario?'checked':''} ${dis?'disabled':''} onchange="cfgSalvar('${key}','${p.nome}','prioritario',this.checked)"><span class="tgl-sl"></span></label>
          </div>
          <div class="cfg-row">
            <label>❄️ Tem freezer</label>
            <label class="tgl"><input type="checkbox" id="cff-${ek}" ${cfg.tem_freezer?'checked':''} ${dis?'disabled':''} onchange="cfgSalvarFreeze('${key}','${p.nome}',this.checked)"><span class="tgl-sl"></span></label>
          </div>
          <div class="cfg-row">
            <label>Mín. Gôndola</label>
            <div class="cfg-row-right">
              <input class="cfg-num" type="number" inputmode="numeric" min="0" id="cfmg-${ek}" value="${cfg.qtd_minima_gondola||0}" ${dis?'disabled':''} onblur="cfgSalvar('${key}','${p.nome}','qtd_minima_gondola',parseFloat(this.value)||0)">
            </div>
          </div>
          <div class="cfg-row" id="cfgfr-${ek}" style="${cfg.tem_freezer?'':'display:none'}">
            <label>Mín. Freezer</label>
            <div class="cfg-row-right">
              <input class="cfg-num" type="number" inputmode="numeric" min="0" id="cfmf-${ek}" value="${cfg.qtd_minima_freezer||0}" ${dis?'disabled':''} onblur="cfgSalvar('${key}','${p.nome}','qtd_minima_freezer',parseFloat(this.value)||0)">
            </div>
          </div>
          <div class="cfg-row">
            <label>Unidade</label>
            <select class="cfg-select" id="cfu-${ek}" ${dis?'disabled':''} onchange="cfgSalvar('${key}','${p.nome}','unidade_checklist',this.value);cfgToggleGp('${ek}',this.value)">
              <option value="pacote"${(cfg.unidade_checklist||'')===('pacote')?' selected':''}>pacote</option>
              <option value="unidade"${(cfg.unidade_checklist||'')==='unidade'?' selected':''}>unidade</option>
              <option value="kg"${(cfg.unidade_checklist||'')==='kg'?' selected':''}>kg</option>
            </select>
          </div>
          <div class="cfg-row" id="cfggp-${ek}" style="${(cfg.unidade_checklist==='pacote')?'':'display:none'}">
            <label>📦 Gramas/pacote (médio)</label>
            <div class="cfg-row-right">
              <input class="cfg-num" type="number" inputmode="numeric" min="0" id="cfgp-${ek}" value="${cfg.gramas_por_pacote||''}" placeholder="—" ${dis?'disabled':''} onblur="cfgSalvar('${key}','${p.nome}','gramas_por_pacote',parseFloat(this.value)||0)">
              <span style="font-size:.7rem;color:var(--gray);font-weight:600;">g</span>
            </div>
          </div>
        </div>`;
      });
    });

    if(!prods||!prods.length)html+=`<div class="emp"><div class="big">📦</div><p>Nenhum produto encontrado para ${CFG_SETOR_VIEW}.</p></div>`;
    el.innerHTML=html;setSyncUI('ok');
  }catch(e){console.error(e);el.innerHTML=`<div class="emp"><div class="big">⚠️</div><p>Erro: ${e.message}</p></div>`;setSyncUI('err');}
}

function cfgToggleGp(ek,unit){
  const row=document.getElementById('cfggp-'+ek);
  if(row)row.style.display=unit==='pacote'?'':'none';
}

function cfgSalvarFreeze(key,nome,val){
  const ek=ekFromKey(key);
  const frRow=document.getElementById('cfgfr-'+ek);
  if(frRow)frRow.style.display=val?'':'none';
  cfgSalvar(key,nome,'tem_freezer',val);
}

async function cfgSalvar(key,nome,campo,valor){
  clearTimeout(_cfgSaveTimers[key]);
  _cfgSaveTimers[key]=setTimeout(async()=>{
    try{
      // Constrói linha COMPLETA a partir do cache — evita zerar outros campos no upsert
      const base=_cfgRowCache[key]||{};
      const row={
        produto_id:   base.produto_id   || key,
        produto_nome: base.produto_nome || nome,
        setor:        base.setor        || CFG_SETOR_VIEW,
        ativo:        base.ativo!==undefined ? base.ativo : true,
        prioritario:  base.prioritario  || false,
        tem_freezer:  base.tem_freezer  || false,
        unidade_checklist:   base.unidade_checklist   || 'und',
        gramas_por_pacote:   base.gramas_por_pacote   || 0,
        qtd_minima_gondola:  base.qtd_minima_gondola  || 0,
        qtd_minima_freezer:  base.qtd_minima_freezer  || 0,
        [campo]: valor  // substitui só o campo alterado
      };
      if(base.id)row.id=base.id;
      await sbUpsert('checklist_config',[row]);
      // Atualiza cache e memória local
      _cfgRowCache[key]={..._cfgRowCache[key],...row};
      if(!CHK_CONFIG[key])CHK_CONFIG[key]={};
      CHK_CONFIG[key][campo]=valor;
      _cfgAlterada=true;
      if(SESSAO_ATIVA)atualizarCard(key);
    }catch(e){toast('Erro ao salvar: '+e.message,'er');}
  },500);
}

async function recarregarConfig(mostrarToast){
  try{
    const cfgs=await sbSelect('checklist_config',`setor=eq.${encodeURIComponent(SETOR)}&ativo=eq.true&limit=500`).catch(()=>[]);
    CHK_CONFIG={};(cfgs||[]).forEach(c=>{CHK_CONFIG[c.produto_id||c.produto_nome]=c;});
    // Reaplicar PRODS_PRIO como fonte de verdade
    const prioByNome={};
    PRODS_PRIO.filter(pp=>pp.setor===SETOR).forEach(pp=>{prioByNome[pp.nome.toUpperCase()]=pp;});
    PRODUTOS.forEach(p=>{
      const pp=prioByNome[p.nome.toUpperCase()];if(!pp)return;
      const key=String(p.id||p.nome);
      if(!CHK_CONFIG[key])CHK_CONFIG[key]={produto_id:key,produto_nome:p.nome,setor:SETOR,ativo:true};
      if(pp.prioritario&&!CHK_CONFIG[key].prioritario)CHK_CONFIG[key].prioritario=true;
      if(pp.qtd_minima_gondola&&!CHK_CONFIG[key].qtd_minima_gondola)CHK_CONFIG[key].qtd_minima_gondola=pp.qtd_minima_gondola;
      if(pp.qtd_minima_freezer&&!CHK_CONFIG[key].qtd_minima_freezer)CHK_CONFIG[key].qtd_minima_freezer=pp.qtd_minima_freezer;
      if(pp.tem_freezer&&!CHK_CONFIG[key].tem_freezer)CHK_CONFIG[key].tem_freezer=pp.tem_freezer;
      if(pp.unidade_checklist&&(!CHK_CONFIG[key].unidade_checklist||CHK_CONFIG[key].unidade_checklist==='und'))CHK_CONFIG[key].unidade_checklist=pp.unidade_checklist;
    });
    _cfgAlterada=false;
    if(SESSAO_ATIVA)renderChecklist();
    if(mostrarToast)toast('✅ Configurações atualizadas','ok');
  }catch(e){toast('Erro ao recarregar: '+e.message,'er');}
}
</script>
